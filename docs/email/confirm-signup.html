<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Confirm your email — InHand</title>
</head>
<body style="margin:0;padding:0;background-color:#f8fafc;font-family:system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif;">
  <table role="presentation" width="100%" cellspacing="0" cellpadding="0" style="background-color:#f8fafc;padding:32px 16px;">
    <tr>
      <td align="center">
        <table role="presentation" width="100%" style="max-width:480px;background:#ffffff;border-radius:16px;border:1px solid #e2e8f0;padding:32px 28px;">
          <tr>
            <td>
              <p style="margin:0 0 8px;font-size:11px;font-weight:700;letter-spacing:0.14em;text-transform:uppercase;color:#0d9488;">InHand</p>
              <h1 style="margin:0 0 12px;font-size:22px;line-height:1.25;color:#0f172a;">Confirm your email</h1>
              <p style="margin:0 0 24px;font-size:15px;line-height:1.55;color:#475569;">
                Thanks for signing up. Confirm your email to start using InHand and save your salary workspace.
              </p>
              <a href="{{ .ConfirmationURL }}" style="display:inline-block;padding:14px 24px;border-radius:9999px;background:#0d9488;color:#ffffff;font-size:15px;font-weight:600;text-decoration:none;">
                Confirm email
              </a>
              <p style="margin:24px 0 0;font-size:13px;line-height:1.5;color:#64748b;">
                If the button doesn’t work, paste this link into your browser:<br />
                <span style="word-break:break-all;color:#0f766e;">{{ .ConfirmationURL }}</span>
              </p>
              <p style="margin:24px 0 0;font-size:12px;line-height:1.5;color:#94a3b8;">
                If you didn’t create an account, you can ignore this email.
              </p>
            </td>
          </tr>
        </table>
      </td>
    </tr>
  </table>
</body>
</html>
